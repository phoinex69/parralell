services:
  web:
    build: .
    container_name: commerce_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo &&
             gunicorn commerce_engine.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 30"
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "docker-local-student-project-key"
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost,0.0.0.0,web"
      POSTGRES_DB: "commerce_engine"
      POSTGRES_USER: "commerce_user"
      POSTGRES_PASSWORD: "commerce_password"
      POSTGRES_HOST: "db"
      POSTGRES_PORT: "5432"
      REDIS_URL: "redis://redis:6379/0"
      CACHE_REDIS_URL: "redis://redis:6379/1"
      MAX_CONCURRENT_REQUESTS: "20"
      CAPACITY_WAIT_SECONDS: "2"
      CELERY_WORKER_CONCURRENCY: "4"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - .:/app

  worker:
    build: .
    container_name: commerce_worker
    command: >
      sh -c "celery -A commerce_engine worker -l info -Q emails,invoices,analytics --concurrency=4"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "docker-local-student-project-key"
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost,0.0.0.0,web"
      POSTGRES_DB: "commerce_engine"
      POSTGRES_USER: "commerce_user"
      POSTGRES_PASSWORD: "commerce_password"
      POSTGRES_HOST: "db"
      POSTGRES_PORT: "5432"
      REDIS_URL: "redis://redis:6379/0"
      CACHE_REDIS_URL: "redis://redis:6379/1"
      CELERY_WORKER_CONCURRENCY: "4"
    depends_on:
      web:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  flower:
    build: .
    container_name: commerce_flower
    command: >
      sh -c "celery -A commerce_engine flower --port=5555"
    ports:
      - "5555:5555"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "docker-local-student-project-key"
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost,0.0.0.0,web"
      POSTGRES_DB: "commerce_engine"
      POSTGRES_USER: "commerce_user"
      POSTGRES_PASSWORD: "commerce_password"
      POSTGRES_HOST: "db"
      POSTGRES_PORT: "5432"
      REDIS_URL: "redis://redis:6379/0"
      CACHE_REDIS_URL: "redis://redis:6379/1"
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - .:/app
    profiles:
      - monitoring

  redis:
    image: redis:7-alpine
    container_name: commerce_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres:16-alpine
    container_name: commerce_db
    environment:
      POSTGRES_DB: "commerce_engine"
      POSTGRES_USER: "commerce_user"
      POSTGRES_PASSWORD: "commerce_password"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commerce_user -d commerce_engine"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
